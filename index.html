<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Organizer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📚 Link Organizer</h1>
            <p>Quick access to organized links</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                class="search-bar" 
                placeholder="🔍 Search links by title, description, or category..."
            >
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <div id="categoryButtons" class="category-buttons"></div>
            </div>
        </div>

        <!-- Links Display Section -->
        <div class="content">
            <div id="linksContainer" class="links-container"></div>
            <div id="noResults" class="no-results" style="display: none;">
                <p>No links found. Try a different search!</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
