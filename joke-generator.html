<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="joke-styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>😂 Joke Generator</h1>
            <p>Get random jokes to brighten your day!</p>
        </header>

        <!-- Controls Section -->
        <div class="controls-section">
            <div class="category-select">
                <label for="jokeCategory">Select Category:</label>
                <select id="jokeCategory">
                    <option value="random">Random</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock Knock</option>
                </select>
            </div>
        </div>

        <!-- Joke Display Section -->
        <div class="joke-section">
            <div id="jokeContainer" class="joke-container">
                <div class="joke-placeholder">
                    <p>Click "Get Joke" to start!</p>
                </div>
            </div>

            <!-- Joke Type Badge -->
            <div id="jokeType" class="joke-type-badge"></div>

            <!-- Buttons -->
            <div class="button-group">
                <button id="getJokeBtn" class="btn btn-primary">Get Joke</button>
                <button id="copyBtn" class="btn btn-secondary">Copy Joke</button>
                <button id="shareBtn" class="btn btn-secondary">Share</button>
            </div>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading joke...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <!-- Success Message -->
        <div id="successMessage" class="success-message" style="display: none;"></div>

        <!-- Stats Section -->
        <div class="stats-section">
            <p>Jokes generated: <span id="jokeCount">0</span></p>
        </div>
    </div>

    <script src="joke-script.js"></script>
</body>
</html>
